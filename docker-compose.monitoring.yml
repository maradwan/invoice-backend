services:
  backend:
    environment:
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "invoice-backend"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      PROMETHEUS_METRICS_ENABLED: "true"
      PROMETHEUS_METRICS_PATH: "/metrics"
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./monitoring/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "9464:9464"
    networks:
      - invoice-network

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
    networks:
      - invoice-network

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - invoice-network

  alloy:
    image: grafana/alloy:v1.8.3
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - invoice-network

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - mongodb-exporter
    networks:
      - invoice-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    command:
      - "--mongodb.uri=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/admin"
      - "--compatible-mode"
      - "--collector.dbstats"
      - "--collector.collstats"
      - "--collector.indexstats"
      - "--collector.topmetrics"
    depends_on:
      - mongodb
    networks:
      - invoice-network

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - invoice-network

  mlflow:
    image: python:3.11-slim
    profiles: ["mlflow"]
    working_dir: /mlflow
    command: >
      bash -lc "pip install --no-cache-dir mlflow==2.16.2 &&
      mlflow server --host 0.0.0.0 --port 5001
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5001:5001"
    networks:
      - invoice-network

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["langfuse"]
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:-langfuse}@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3003}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-replace-me-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-replace-me-langfuse-salt}
      TELEMETRY_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse}
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse}@langfuse-clickhouse:9000/langfuse
      S3_ENDPOINT: http://langfuse-minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ACCESS_KEY:-minio}
      S3_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_SECRET_KEY:-replace-me-minio-secret}
      S3_BUCKET: langfuse
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "3003:3000"
    depends_on:
      - langfuse-postgres
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-minio
    networks:
      - invoice-network

  langfuse-postgres:
    image: postgres:16
    profiles: ["langfuse"]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    networks:
      - invoice-network

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    profiles: ["langfuse"]
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    networks:
      - invoice-network

  langfuse-redis:
    image: redis:7
    profiles: ["langfuse"]
    networks:
      - invoice-network

  langfuse-minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    profiles: ["langfuse"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_SECRET_KEY:-replace-me-minio-secret}
    volumes:
      - langfuse_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - invoice-network

volumes:
  loki_data:
  prometheus_data:
  grafana_data:
  mlflow_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_minio_data:

networks:
  invoice-network:
    external: true
    name: invoice-shared-network
